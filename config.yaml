      + RFC3161-Anchor failed
    false_block_cost_eur: 80
    legitimate_block_condition: env_tag != prod ODER Backup-Replication-Lag > 60s
      ODER DATEV-API unreachable >300s ODER PHRONESIS_TICKET missing fuer Real-Mode
  - gate_id: K14
    block_reason: STOP.flag aktiv ODER Override-Doku > 30 Tage alt ODER Family-Office
      Q_0-Audit fehlgeschlagen
    false_block_cost_eur: 100
    legitimate_block_condition: Martin hat STOP.flag gesetzt ODER Brueder-Loehne-Mandanten-Isolation
      verletzt
  - gate_id: K11
    block_reason: Cascade-Isolation verletzt (Tenant-Boundary failed) ODER DLQ-Backlog
      > Threshold
    false_block_cost_eur: 60
    legitimate_block_condition: DATEV-API-Failure cascading auf andere Tenants ODER
      Quota-Hard-Cap (50 Calls) erreicht
  graceful_degradation_path: degraded_no_datev (DATEV down, dry-run Cache) ODER degraded_dry_run
