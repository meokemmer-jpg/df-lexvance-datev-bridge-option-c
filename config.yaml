  GoBD-Audit-Wrapper (hash_chain + RFC3161-Stub + S3-Object-Lock-Stub) per CRIT-W7-4.

  Daily 05:00. Mock-Mode default; Real-Mode via DF_LEXVANCE_DATEV_C_REAL_ENABLED=true
  + PHRONESIS_TICKET.

  '
default_action:
